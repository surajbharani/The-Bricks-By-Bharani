name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 0.1.0)'
        required: false
        default: '0.1.0'

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python sidecar (PyInstaller) ───────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies + PyInstaller
        working-directory: engine/agent-nano-bricks
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Build agent-nano-bricks sidecar
        working-directory: engine/agent-nano-bricks
        run: pyinstaller agent-nano-bricks.spec --distpath dist --workpath build

      - name: Copy sidecar to Tauri binaries directory
        shell: bash
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          cp engine/agent-nano-bricks/dist/agent-nano-bricks.exe \
             apps/desktop/src-tauri/binaries/agent-nano-bricks-x86_64-pc-windows-msvc.exe

      # ── Node / pnpm / frontend build ───────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build React frontend
        working-directory: apps/desktop
        env:
          VITE_OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          VITE_GOOGLE_SEARCH_KEY: ${{ secrets.GOOGLE_SEARCH_KEY }}
          VITE_GOOGLE_SEARCH_CX: ${{ secrets.GOOGLE_SEARCH_CX }}
          VITE_YOUTUBE_KEY: ${{ secrets.YOUTUBE_KEY }}
        run: pnpm build

      # ── Rust / Tauri ────────────────────────────────────────────────────────
      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      - name: Build Tauri Windows installer
        working-directory: apps/desktop
        env:
          # Optional: set signing secrets in GitHub → Settings → Secrets
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          VITE_GOOGLE_SEARCH_KEY: ${{ secrets.GOOGLE_SEARCH_KEY }}
          VITE_GOOGLE_SEARCH_CX: ${{ secrets.GOOGLE_SEARCH_CX }}
          VITE_YOUTUBE_KEY: ${{ secrets.YOUTUBE_KEY }}
        run: tauri build --target x86_64-pc-windows-msvc

      # ── Upload artifacts ────────────────────────────────────────────────────
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: nano-bricks-windows-${{ github.ref_name || inputs.version }}
          retention-days: 30
          path: |
            apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload MSI (if present)
        uses: actions/upload-artifact@v4
        with:
          name: nano-bricks-windows-msi-${{ github.ref_name || inputs.version }}
          retention-days: 30
          if-no-files-found: ignore
          path: |
            apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
